version: '3.8'

services:
  unibd-registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unibd-registry
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    # Commented out ports as requested for production readiness
    # ports:
    #   - "3000:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
