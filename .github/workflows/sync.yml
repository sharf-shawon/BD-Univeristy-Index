name: Sync UGC Data

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        run: npm run sync
        env:
          APP_URL: "https://sharfuddin-shawon.github.io/bd-university-index" # Example URL, update as needed

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/universities.json public/sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly data sync from UGC [skip ci]" && git push)

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = `Sync Failed: ${new Date().toISOString()}`;
            const issueBody = `The scheduled UGC data synchronization failed. Check the [Workflow Run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody
            });
